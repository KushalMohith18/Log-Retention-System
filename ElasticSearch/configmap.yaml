apiVersion: v1
kind: ConfigMap
metadata:
  name: es-config
  namespace: logging
data:
  elasticsearch.yml: |
    cluster.name: prod-logs
    discovery.type: single-node
    xpack.security.enabled: false
    node.store.allow_mmap: false
    network.host: 0.0.0.0
    path.repo: ["/usr/share/elasticsearch/snapshots"]